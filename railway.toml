[build]
builder = "NIXPACKS"
buildCommand = "pip install -e . && python scripts/download_model.py"

[deploy]
startCommand = "gunicorn \"poem_assoc:create_app()\" --bind 0.0.0.0:$PORT --workers 1 --threads 2 --timeout 180"
healthcheckPath = "/"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
